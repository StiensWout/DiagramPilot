name: CI

on:
  pull_request:
    branches:
      - nightly
      - main

permissions:
  contents: read

jobs:
  fallow:
    name: Code quality audit (pull requests only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      FALLOW_UPDATE_CHECK: "off"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Run code quality audit
        uses: fallow-rs/fallow@v2.89.0
        with:
          command: audit
          version: 2.89.0
          fail-on-issues: true
          dead-code-baseline: fallow-baselines/dead-code.json
          annotations: true
          artifacts-dir: .fallow-action

  validate:
    name: Root tests (parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Verify release version metadata
        run: node scripts/run-with-timing.mjs "release version metadata" -- npm run check:release-version

      - name: Build workspace
        run: node scripts/run-with-timing.mjs "workspace build" -- npm run build

      - name: Run parallel root tests
        run: node scripts/run-with-timing.mjs "parallel root tests" -- npm run test:root:parallel

  shared-output-tests:
    name: Shared-output tests (serial)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: node scripts/run-with-timing.mjs "workspace build" -- npm run build

      - name: Run shared-output root tests
        run: node scripts/run-with-timing.mjs "shared-output root tests" -- npm run test:root:shared

  public-surface:
    name: Schema and website surface
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Check DiagramSpec schema drift
        run: |
          node scripts/run-with-timing.mjs "DiagramSpec schema generation" -- npm run generate:schema
          git diff --exit-code -- schema/diagramspec-v1.schema.json

      - name: Run website tests
        run: node scripts/run-with-timing.mjs "website tests" -- npm --workspace website run test

  package-readiness:
    name: Package readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: node scripts/run-with-timing.mjs "workspace build" -- npm run build

      - name: Check public package readiness
        run: node scripts/run-with-timing.mjs "package readiness" -- npm run check:package-readiness

      - name: Check public package size budgets
        run: node scripts/run-with-timing.mjs "package size budgets" -- npm run check:package-size-budgets

  validate-complete:
    name: Test suite and package readiness
    needs:
      - validate
      - shared-output-tests
      - public-surface
      - package-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report validation split completion
        run: echo "Split validation jobs completed successfully."
