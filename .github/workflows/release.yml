name: Release

on:
  push:
    branches:
      - "feature/**"
  workflow_dispatch:
    inputs:
      release_kind:
        description: Run a validation dry-run or publish the final milestone release
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - milestone
      version:
        description: Final release version; must match package.json for milestone publishing
        required: false
        type: string
      milestone:
        description: Milestone name for final release notes
        required: false
        default: "0.4.0"
        type: string
      previous_tag:
        description: Previous release tag for the full changelog link
        required: false
        type: string
      highlights:
        description: Markdown for the final release Highlights section
        required: false
        type: string
      breaking_changes:
        description: Markdown for the final release Breaking Changes section
        required: false
        type: string
      upgrade_notes:
        description: Markdown for the final release Upgrade Notes section
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-checks:
    name: Release checks (nightly or manual final)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      base_version: ${{ steps.release-plan.outputs.base_version }}
      next_version: ${{ steps.release-plan.outputs.next_version }}
      publish_version: ${{ steps.release-plan.outputs.publish_version }}
      dist_tag: ${{ steps.release-plan.outputs.dist_tag }}
      should_publish: ${{ steps.release-plan.outputs.should_publish }}
      release_kind: ${{ steps.release-plan.outputs.release_kind }}
      release_tag: ${{ steps.release-plan.outputs.release_tag }}
      milestone: ${{ steps.release-plan.outputs.milestone }}
      previous_tag: ${{ steps.release-plan.outputs.previous_tag }}
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      DIAGRAMPILOT_NPM_PUBLISH_ENABLED: ${{ vars.DIAGRAMPILOT_NPM_PUBLISH_ENABLED }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Verify shared release version metadata
        run: npm run check:release-version

      - name: Build workspace
        run: npm run build

      - name: Run root test suite
        run: npm test

      - name: Check DiagramSpec schema drift
        run: |
          npm run generate:schema
          git diff --exit-code -- schema/diagramspec-v1.schema.json

      - name: Build website
        run: npm --workspace website run build

      - name: Run website tests
        run: npm --workspace website run test

      - name: Verify checkout demo workflow
        run: |
          cd demo-projects/checkout
          node ../../packages/cli/dist/index.js render docs/architecture.dp.yaml --out docs/architecture.svg
          node ../../packages/cli/dist/index.js check
          cd ../..
          git diff --exit-code -- demo-projects/checkout/docs/architecture.svg

      - name: Check public package readiness
        run: npm run check:package-readiness

      - name: Check public package size budgets
        run: npm run check:package-size-budgets

      - name: Plan release channel
        id: release-plan
        run: node scripts/plan-release-publish.mjs --github-output

      - name: Prepare nightly package metadata
        if: env.RELEASE_DIST_TAG == 'nightly'
        run: |
          node scripts/bump-release-version.mjs "$RELEASE_PUBLISH_VERSION"
          npm run build

      - name: Verify publish version metadata
        run: npm run check:release-version -- "$RELEASE_PUBLISH_VERSION"

      - name: Check publish package readiness
        run: npm run check:package-readiness

      - name: Check publish package size budgets
        run: npm run check:package-size-budgets

      - name: Verify package publish dry-run
        run: node scripts/publish-release-packages.mjs --mode dry-run

  publish-packages:
    name: Publish npm packages (nightly or final)
    needs: release-checks
    if: needs.release-checks.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      RELEASE_PUBLISH_VERSION: ${{ needs.release-checks.outputs.publish_version }}
      RELEASE_DIST_TAG: ${{ needs.release-checks.outputs.dist_tag }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Prepare nightly package metadata
        if: env.RELEASE_DIST_TAG == 'nightly'
        run: node scripts/bump-release-version.mjs "$RELEASE_PUBLISH_VERSION"

      - name: Verify intended publish version before package publish
        run: npm run check:release-version -- "$RELEASE_PUBLISH_VERSION"

      - name: Build publish artifacts
        run: npm run build

      - name: Check publish package readiness
        run: npm run check:package-readiness

      - name: Check publish package size budgets
        run: npm run check:package-size-budgets

      - name: Publish npm packages
        run: node scripts/publish-release-packages.mjs --mode publish

  create-github-prerelease:
    name: Create nightly GitHub prerelease
    needs: [release-checks, publish-packages]
    if: needs.release-checks.outputs.should_publish == 'true' && needs.release-checks.outputs.dist_tag == 'nightly'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_PUBLISH_VERSION: ${{ needs.release-checks.outputs.publish_version }}
      RELEASE_TAG: ${{ needs.release-checks.outputs.release_tag }}
      RELEASE_BRANCH: ${{ github.ref_name }}
      RELEASE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Create nightly release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release-tag.txt"; then
            echo "Nightly tag $RELEASE_TAG already exists."
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - name: Generate nightly GitHub Release body
        run: |
          node scripts/generate-release-notes.mjs \
            --kind nightly \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG" \
            --branch "$RELEASE_BRANCH" \
            --commit "$GITHUB_SHA" \
            --run-url "$RELEASE_RUN_URL" > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

      - name: Create or update nightly GitHub prerelease
        run: |
          if gh release view "$RELEASE_TAG" --json tagName > "$RUNNER_TEMP/release-state.json" 2>/dev/null; then
            gh release edit "$RELEASE_TAG" \
              --prerelease \
              --latest=false \
              --title "DiagramPilot $RELEASE_TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --prerelease \
              --latest=false \
              --title "DiagramPilot $RELEASE_TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

  prepare-github-release-draft:
    name: Prepare final GitHub Release draft
    needs: [release-checks, publish-packages]
    if: needs.release-checks.outputs.should_publish == 'true' && needs.release-checks.outputs.dist_tag == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: read
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_PUBLISH_VERSION: ${{ needs.release-checks.outputs.publish_version }}
      RELEASE_TAG: ${{ needs.release-checks.outputs.release_tag }}
      RELEASE_MILESTONE: ${{ needs.release-checks.outputs.milestone }}
      RELEASE_PREVIOUS_TAG: ${{ needs.release-checks.outputs.previous_tag }}
      RELEASE_HIGHLIGHTS: ${{ github.event.inputs.highlights }}
      RELEASE_BREAKING_CHANGES: ${{ github.event.inputs.breaking_changes }}
      RELEASE_UPGRADE_NOTES: ${{ github.event.inputs.upgrade_notes }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Verify intended final version before GitHub Release
        run: node scripts/check-release-version.mjs "$RELEASE_PUBLISH_VERSION"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release-tag.txt"; then
            remote_tag_sha="$(cut -f1 "$RUNNER_TEMP/release-tag.txt")"
            if [ "$remote_tag_sha" != "$GITHUB_SHA" ]; then
              echo "Remote tag $RELEASE_TAG points at $remote_tag_sha; reusing existing release tag."
            else
              echo "Remote tag $RELEASE_TAG already points at $GITHUB_SHA."
            fi
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - name: Generate final GitHub Release draft body
        run: |
          gh pr list --state merged --base main --limit 100 --json number,title,url,headRefName,author,mergedAt > "$RUNNER_TEMP/release-prs.json"
          printf '%s\n' "$RELEASE_HIGHLIGHTS" > "$RUNNER_TEMP/release-highlights.md"
          printf '%s\n' "$RELEASE_BREAKING_CHANGES" > "$RUNNER_TEMP/release-breaking-changes.md"
          printf '%s\n' "$RELEASE_UPGRADE_NOTES" > "$RUNNER_TEMP/release-upgrade-notes.md"

          node scripts/generate-release-notes.mjs \
            --kind final \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG" \
            --milestone "$RELEASE_MILESTONE" \
            --previous-tag "$RELEASE_PREVIOUS_TAG" \
            --prs-json "$RUNNER_TEMP/release-prs.json" \
            --highlights-file "$RUNNER_TEMP/release-highlights.md" \
            --breaking-changes-file "$RUNNER_TEMP/release-breaking-changes.md" \
            --upgrade-notes-file "$RUNNER_TEMP/release-upgrade-notes.md" > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

      - name: Create or update final GitHub Release draft
        run: |
          if gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft > "$RUNNER_TEMP/release-draft-state.txt" 2>/dev/null; then
            if [ "$(cat "$RUNNER_TEMP/release-draft-state.txt")" != "true" ]; then
              echo "GitHub Release $RELEASE_TAG already exists and is not a draft." >&2
              exit 1
            fi

            gh release edit "$RELEASE_TAG" \
              --draft \
              --title "DiagramPilot $RELEASE_TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --verify-tag \
              --title "DiagramPilot $RELEASE_TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Validate generated final GitHub Release draft
        run: |
          gh release view "$RELEASE_TAG" --json tagName,name,body,isDraft,isPrerelease > "$RUNNER_TEMP/release-draft.json"
          node scripts/validate-github-release-draft.mjs \
            --draft-json "$RUNNER_TEMP/release-draft.json" \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG"

  publish-github-release:
    name: Publish final GitHub Release after approval
    needs: [release-checks, prepare-github-release-draft]
    if: needs.release-checks.outputs.should_publish == 'true' && needs.release-checks.outputs.dist_tag == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    environment: github-release-publication
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_PUBLISH_VERSION: ${{ needs.release-checks.outputs.publish_version }}
      RELEASE_TAG: ${{ needs.release-checks.outputs.release_tag }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Verify intended final version before GitHub Release publication
        run: node scripts/check-release-version.mjs "$RELEASE_PUBLISH_VERSION"

      - name: Validate reviewed final GitHub Release draft
        run: |
          gh release view "$RELEASE_TAG" --json tagName,name,body,isDraft,isPrerelease > "$RUNNER_TEMP/release-draft.json"
          node scripts/validate-github-release-draft.mjs \
            --draft-json "$RUNNER_TEMP/release-draft.json" \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG"

      - name: Publish reviewed final GitHub Release draft
        run: gh release edit "$RELEASE_TAG" --draft=false --verify-tag --latest
