name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release and publish dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      base_version: ${{ steps.release-plan.outputs.base_version }}
      publish_version: ${{ steps.release-plan.outputs.publish_version }}
      dist_tag: ${{ steps.release-plan.outputs.dist_tag }}
      should_publish: ${{ steps.release-plan.outputs.should_publish }}
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      DIAGRAMPILOT_NPM_PUBLISH_ENABLED: ${{ vars.DIAGRAMPILOT_NPM_PUBLISH_ENABLED }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Verify shared release version metadata
        run: npm run check:release-version

      - name: Verify issue release version metadata
        run: npm run check:issue-release-version

      - name: Build workspace
        run: npm run build

      - name: Run root test suite
        run: npm test

      - name: Check DiagramSpec schema drift
        run: |
          npm run generate:schema
          git diff --exit-code -- schema/diagramspec-v1.schema.json

      - name: Build website
        run: npm --workspace website run build

      - name: Run website tests
        run: npm --workspace website run test

      - name: Verify checkout demo workflow
        run: |
          cd demo-projects/checkout
          node ../../packages/cli/dist/index.js render docs/architecture.dp.yaml --out docs/architecture.svg
          node ../../packages/cli/dist/index.js check
          cd ../..
          git diff --exit-code -- demo-projects/checkout/docs/architecture.svg

      - name: Check public package readiness
        run: npm run check:package-readiness

      - name: Plan release publish channel
        id: release-plan
        run: node scripts/plan-release-publish.mjs --github-output

      - name: Prepare nightly package metadata
        if: env.RELEASE_DIST_TAG == 'nightly'
        run: |
          node scripts/bump-release-version.mjs "$RELEASE_PUBLISH_VERSION"
          npm run build

      - name: Verify publish version metadata
        run: npm run check:release-version -- "$RELEASE_PUBLISH_VERSION"

      - name: Check publish package readiness
        run: npm run check:package-readiness

      - name: Verify package publish dry-run
        run: |
          if [ "$RELEASE_DIST_TAG" = "latest" ] && npm run check:package-publish-state -- --expect latest; then
            echo "Public Package Set already publishes $RELEASE_PUBLISH_VERSION under latest; skipping npm publish dry-run."
            exit 0
          fi

          packages=(
            "diagrampilot"
            "@diagrampilot/core"
            "@diagrampilot/icons"
            "@diagrampilot/export-mermaid"
            "@diagrampilot/export-d2"
            "@diagrampilot/export-dot"
            "@diagrampilot/mcp"
            "@diagrampilot/render-svg"
          )

          for workspace in "${packages[@]}"; do
            if npm view "$workspace@$RELEASE_PUBLISH_VERSION" version --silent > /dev/null 2>&1; then
              echo "$workspace@$RELEASE_PUBLISH_VERSION already exists; skipping npm publish dry-run."
              continue
            fi

            npm publish --dry-run --workspace "$workspace" --tag "$RELEASE_DIST_TAG" --access public
          done

  publish-packages:
    name: Publish public packages
    needs: validate-release
    if: needs.validate-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      RELEASE_PUBLISH_VERSION: ${{ needs.validate-release.outputs.publish_version }}
      RELEASE_DIST_TAG: ${{ needs.validate-release.outputs.dist_tag }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use workspace npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Prepare nightly package metadata
        if: env.RELEASE_DIST_TAG == 'nightly'
        run: node scripts/bump-release-version.mjs "$RELEASE_PUBLISH_VERSION"

      - name: Verify intended Issue Version before package publish
        run: npm run check:release-version -- "$RELEASE_PUBLISH_VERSION"

      - name: Build publish artifacts
        run: npm run build

      - name: Check publish package readiness
        run: npm run check:package-readiness

      - name: Publish public packages
        run: |
          if [ "$RELEASE_DIST_TAG" = "latest" ] && npm run check:package-publish-state -- --expect latest; then
            echo "Public Package Set already publishes $RELEASE_PUBLISH_VERSION under latest; skipping npm publish."
            exit 0
          fi

          packages=(
            "diagrampilot"
            "@diagrampilot/core"
            "@diagrampilot/icons"
            "@diagrampilot/export-mermaid"
            "@diagrampilot/export-d2"
            "@diagrampilot/export-dot"
            "@diagrampilot/mcp"
            "@diagrampilot/render-svg"
          )

          for workspace in "${packages[@]}"; do
            if npm view "$workspace@$RELEASE_PUBLISH_VERSION" version --silent > /dev/null 2>&1; then
              current_tag="$(npm view "$workspace" "dist-tags.$RELEASE_DIST_TAG" --silent 2>/dev/null || true)"

              if [ "$current_tag" != "$RELEASE_PUBLISH_VERSION" ]; then
                npm dist-tag add "$workspace@$RELEASE_PUBLISH_VERSION" "$RELEASE_DIST_TAG"
              else
                echo "$workspace@$RELEASE_PUBLISH_VERSION already publishes under $RELEASE_DIST_TAG; skipping npm publish."
              fi

              continue
            fi

            npm publish --workspace "$workspace" --tag "$RELEASE_DIST_TAG" --access public
          done

  prepare-github-release-draft:
    name: Prepare GitHub Release draft
    needs: [validate-release, publish-packages]
    if: needs.validate-release.outputs.should_publish == 'true' && needs.validate-release.outputs.dist_tag == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_PUBLISH_VERSION: ${{ needs.validate-release.outputs.publish_version }}
      RELEASE_TAG: v${{ needs.validate-release.outputs.publish_version }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Verify intended Issue Version before GitHub Release
        run: node scripts/check-release-version.mjs "$RELEASE_PUBLISH_VERSION"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release-tag.txt"; then
            remote_tag_sha="$(cut -f1 "$RUNNER_TEMP/release-tag.txt")"
            if [ "$remote_tag_sha" != "$GITHUB_SHA" ]; then
              echo "Remote tag $RELEASE_TAG points at $remote_tag_sha; reusing existing release tag."
            else
              echo "Remote tag $RELEASE_TAG already points at $GITHUB_SHA."
            fi
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - name: Generate GitHub Release draft body
        run: |
          node scripts/generate-release-notes.mjs \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG" > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

      - name: Create or update GitHub Release draft
        run: |
          if gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft > "$RUNNER_TEMP/release-draft-state.txt" 2>/dev/null; then
            if [ "$(cat "$RUNNER_TEMP/release-draft-state.txt")" != "true" ]; then
              echo "GitHub Release $RELEASE_TAG already exists and is not a draft." >&2
              exit 1
            fi

            gh release edit "$RELEASE_TAG" \
              --draft \
              --title "DiagramPilot $RELEASE_TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --verify-tag \
              --title "DiagramPilot $RELEASE_TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Validate generated GitHub Release draft
        run: |
          gh release view "$RELEASE_TAG" --json tagName,name,body,isDraft,isPrerelease > "$RUNNER_TEMP/release-draft.json"
          node scripts/validate-github-release-draft.mjs \
            --draft-json "$RUNNER_TEMP/release-draft.json" \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG"

  publish-github-release:
    name: Publish reviewed GitHub Release
    needs: [validate-release, prepare-github-release-draft]
    if: needs.validate-release.outputs.should_publish == 'true' && needs.validate-release.outputs.dist_tag == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    environment: github-release-publication
    env:
      CI: "true"
      FORCE_COLOR: "0"
      NO_COLOR: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_PUBLISH_VERSION: ${{ needs.validate-release.outputs.publish_version }}
      RELEASE_TAG: v${{ needs.validate-release.outputs.publish_version }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Verify intended Issue Version before GitHub Release publication
        run: node scripts/check-release-version.mjs "$RELEASE_PUBLISH_VERSION"

      - name: Validate reviewed GitHub Release draft
        run: |
          gh release view "$RELEASE_TAG" --json tagName,name,body,isDraft,isPrerelease > "$RUNNER_TEMP/release-draft.json"
          node scripts/validate-github-release-draft.mjs \
            --draft-json "$RUNNER_TEMP/release-draft.json" \
            --version "$RELEASE_PUBLISH_VERSION" \
            --tag "$RELEASE_TAG"

      - name: Publish reviewed GitHub Release draft
        run: gh release edit "$RELEASE_TAG" --draft=false --verify-tag --latest
