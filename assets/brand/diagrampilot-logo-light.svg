<svg xmlns="http://www.w3.org/2000/svg" width="720" height="160" viewBox="0 0 720 160" role="img" aria-labelledby="title desc">
  <title id="title">DiagramPilot light wordmark</title>
  <desc id="desc">DiagramPilot wordmark with light text for dark surfaces.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="16" y1="18" x2="144" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="pilot-line" x1="44" y1="50" x2="122" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="soft-glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#34d399" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g>
    <rect x="16" y="16" width="128" height="128" rx="22" fill="url(#mark-bg)" stroke="#334155" stroke-width="2"/>
    <path d="M44 48h38c16 0 28 12 28 28v4" fill="none" stroke="url(#pilot-line)" stroke-width="7" stroke-linecap="round" filter="url(#soft-glow)"/>
    <path d="M44 112h38c16 0 28-12 28-28v-4" fill="none" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
    <rect x="35" y="39" width="36" height="22" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
    <rect x="87" y="69" width="38" height="24" rx="7" fill="#0f172a" stroke="#67e8f9" stroke-width="3"/>
    <rect x="35" y="101" width="36" height="22" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
    <circle cx="110" cy="81" r="4" fill="#f8fafc"/>
    <path d="M42 81h20m-10-10v20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="174" y="92" font-size="62" font-weight="850" letter-spacing="0">DiagramPilot</text>
    <text x="178" y="123" font-size="18" font-weight="700" letter-spacing="0" fill="#cbd5e1">Repo-native diagrams for AI coding agents</text>
  </g>
</svg>
