<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">DiagramPilot mark</title>
  <desc id="desc">A repo-native diagram compiler mark made from connected diagram nodes.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="24" y1="24" x2="232" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="pilot-line" x1="74" y1="78" x2="194" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="soft-glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#34d399" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="216" height="216" rx="38" fill="url(#mark-bg)" stroke="#334155" stroke-width="4"/>
  <path d="M74 77h59c25 0 45 20 45 45v6" fill="none" stroke="url(#pilot-line)" stroke-width="12" stroke-linecap="round" filter="url(#soft-glow)"/>
  <path d="M74 179h59c25 0 45-20 45-45v-6" fill="none" stroke="#67e8f9" stroke-width="12" stroke-linecap="round" opacity="0.92"/>

  <rect x="54" y="60" width="58" height="36" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="6"/>
  <rect x="142" y="108" width="62" height="40" rx="12" fill="#0f172a" stroke="#67e8f9" stroke-width="6"/>
  <rect x="54" y="162" width="58" height="36" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="6"/>

  <circle cx="173" cy="128" r="7" fill="#f8fafc"/>
  <path d="M65 128h34m-17-17v34" stroke="#94a3b8" stroke-width="7" stroke-linecap="round"/>
</svg>
